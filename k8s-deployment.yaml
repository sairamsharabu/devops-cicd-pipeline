apiVersion: apps/v1
kind: Deployment
metadata:
  name: mvc-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mvcapp
  template:
    metadata:
      labels:
        app: mvcapp
    spec:
      containers:
      - name: mvcapp
        image: sairam7892/mvcapp:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: mvc-service
spec:
  type: NodePort
  selector:
    app: mvcapp
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30007